version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wc2026
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000

  dashboard:
    build: .
    command: streamlit run src/dashboard/app.py --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - db
      - redis
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  retrain_scheduler:
    build: .
    command: python scripts/05_retrain.py --daemon
    depends_on:
      - db
      - redis
    env_file: .env

volumes:
  postgres_data: